<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer Circle -->
  <circle cx="50" cy="50" r="45" fill="#0b0f14" stroke="#1f2a33" stroke-width="2"/>
  <!-- Gold Hexagon -->
  <polygon
    points="50,22 72,36 72,64 50,78 28,64 28,36"
    fill="none"
    stroke="#d4af37"
    stroke-width="4"
    stroke-linejoin="round"/>
  <!-- Green Inner Diamond -->
