    <style>
        :root {
            --bg-dark: #0A0A0B;
            --accent-gold: #f4c430;
            --accent-green: #00d084;
            --text-main: #ffffff;
            --text-secondary: #a0a0a0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .blog-container {
            max-width: 900px;
            margin: 120px auto 60px;
            padding: 0 20px;
        }

        .blog-header {
            margin-bottom: 40px;
            text-align: center;
        }

        .blog-category {
            display: inline-block;
            background: var(--accent-green);
            color: var(--bg-dark);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .blog-title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .blog-meta {
            color: var(--text-secondary);
            font-size: 0.95rem;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .blog-featured-image {
            width: 100%;
            height: 450px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .blog-content {
            font-size: 1.15rem;
            color: #e0e0e0;
        }

        .blog-content h2, .blog-content h3, .blog-content h4 {
            color: var(--text-main);
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .blog-content p {
            margin-bottom: 20px;
        }

        .blog-content ul, .blog-content ol {
            margin-bottom: 20px;
            padding-left: 20px;
        }

        .blog-content li {
            margin-bottom: 10px;
        }

        .blog-content .bg-green-50, .blog-content .bg-yellow-50 {
            background: var(--glass-bg);
            border-left: 4px solid var(--accent-green);
            padding: 30px;
            border-radius: 10px;
            margin: 40px 0;
        }

        .blog-content .bg-yellow-50 {
            border-left-color: var(--accent-gold);
        }

        .blog-content .text-green-800, .blog-content .text-green-600 {
            color: var(--accent-green) !important;
        }

        .blog-content .text-yellow-800, .blog-content .text-yellow-600 {
            color: var(--accent-gold) !important;
        }

        .blog-content .text-gray-700 {
            color: #e0e0e0 !important;
        }

        .blog-content .btn-secondary, .blog-content .btn-primary {
            display: inline-block;
            background: var(--accent-gold);
            color: var(--bg-dark);
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 20px;
            transition: transform 0.3s ease;
        }

        .blog-content .btn-secondary:hover {
            transform: scale(1.05);
        }

        .back-to-blog {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 40px;
            transition: gap 0.3s ease;
        }

        .back-to-blog:hover {
            gap: 15px;
        }

        @media (max-width: 768px) {
            .blog-title {
                font-size: 2.2rem;
            }
            .blog-featured-image {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <header class="fixed-nav">
        <nav class="nav-content glass-panel">
            <a href="index.html" class="logo">
                <svg class="logo-svg" viewBox="0 0 650 120" xmlns="http://www.w3.org/2000/svg">

                        <circle r="45" fill="#0b0f14" stroke="#1f2a33" stroke-width="2" />

                    </g>
                    <text x="130" y="68" font-family="'Outfit', sans-serif" font-size="42" font-weight="700" letter-spacing="2">
                        <tspan fill="#ffffff">ISLAND CONNECT</tspan>
                        <tspan dx="8" fill="#00d084">AI</tspan>
                    </text>
                </svg>
            </a>
            <div class="nav-links">
                <a href="index.html#services">Services</a>
                <a href="index.html#portfolio">Featured</a>
                <a href="/index.html#blog">Blog</a>
                <a href="https://islandconnect.fillout.com/getstared" target="_blank" class="btn-animated">START PROJECT <i class="bi bi-arrow-right"></i></a>
            </div>
        </nav>
    </header>

    <div class="blog-container">
        <a href="/index.html#blog" class="back-to-blog"><i class="bi bi-arrow-left"></i> Back to Blog</a>

        <article id="post-container">
            <div class="blog-header">
                <span class="blog-category" id="post-category">Loading...</span>
                <h1 class="blog-title" id="post-title">Loading Post...</h1>
                <div class="blog-meta">
                    <span id="post-date"><i class="bi bi-calendar3"></i> Loading...</span>
                    <span><i class="bi bi-person"></i> Island Connect AI Team</span>
                </div>
            </div>

            <img src="" alt="" class="blog-featured-image" id="post-image">

            <div class="blog-content" id="post-content">
                <!-- Content will be injected here -->
            </div>
        </article>
    </div>

    <footer class="site-footer">
        <div class="container footer-content">
            <p class="footer-copy">© 2026 Island Connect AI. Locally Rooted. Globally Competitive.</p>
        </div>
    </footer>


    <script type="module">
        async function loadPost() {
            const post = window.POST_DATA;
            if (!post) {
                console.error("No post data found in window.POST_DATA");
                return;
            }

            document.title = post.title + " - Island Connect AI";
            document.getElementById('post-category').textContent = post.category;
            document.getElementById('post-title').textContent = post.title;
            document.getElementById('post-date').innerHTML = '<i class="bi bi-calendar3"></i> ' + post.date;
            document.getElementById('post-image').src = post.image;
            document.getElementById('post-image').alt = post.title;
            document.getElementById('post-content').innerHTML = post.content;

            const contentImages = document.querySelectorAll('#post-content img');
            contentImages.forEach(img => {
                img.style.maxWidth = '100%';
                img.style.height = 'auto';
                img.style.borderRadius = '10px';
                img.style.margin = '20px 0';
            });
        }

        window.addEventListener('DOMContentLoaded', loadPost);
    </script>

    <script type="module" src="js/main.js" defer></script>
</body>
